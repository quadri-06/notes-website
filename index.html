<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notepad — Your Personal Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #17171a;
      --surface2: #1f1f24;
      --border: #2e2e35;
      --accent: #e8c97a;
      --accent2: #7ac4e8;
      --text: #ebebeb;
      --muted: #888896;
      --danger: #e87a7a;
      --success: #7ae8a4;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── Pages ── */
    .page { display: none; animation: fadeSlide 0.4s ease forwards; }
    .page.active { display: block; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Auth Page ── */
    #auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(232,201,122,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-card::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(122,196,232,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      margin-bottom: 32px;
      text-align: center;
    }

    .brand-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }

    .brand h1 {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .brand p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
      font-weight: 300;
    }

    /* Tab Toggle */
    .tab-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #0e0e10;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(232,201,122,0.25);
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,122,0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: 10px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { background: #f0d68a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,201,122,0.3); }
    .btn-primary:active { transform: translateY(0); }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .alert.error { background: rgba(232,122,122,0.12); border: 1px solid rgba(232,122,122,0.3); color: var(--danger); }
    .alert.success { background: rgba(122,232,164,0.1); border: 1px solid rgba(122,232,164,0.3); color: var(--success); }
    .alert.show { display: block; }

    /* ── App Page ── */
    #app-page { min-height: 100vh; }

    /* Header */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 14px 6px 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      background: var(--accent);
      color: #0e0e10;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* App layout */
    .app-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 64px);
    }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .btn-new-note {
      width: 100%;
      padding: 10px;
      background: rgba(232,201,122,0.1);
      border: 1px dashed rgba(232,201,122,0.35);
      color: var(--accent);
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-new-note:hover {
      background: rgba(232,201,122,0.18);
      border-style: solid;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-track { background: transparent; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .note-item {
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: all 0.15s;
      position: relative;
    }

    .note-item:hover { background: var(--surface2); border-color: var(--border); }
    .note-item.active { background: rgba(232,201,122,0.08); border-color: rgba(232,201,122,0.25); }

    .note-item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 24px;
    }

    .note-item-preview {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'DM Mono', monospace;
    }

    .note-item-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
    }

    .note-delete-btn {
      position: absolute;
      top: 12px;
      right: 10px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      padding: 2px;
      line-height: 1;
    }

    .note-item:hover .note-delete-btn { opacity: 1; }
    .note-delete-btn:hover { color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* Main editor area */
    .main-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Upload panel */
    .upload-panel {
      padding: 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .upload-panel h3 {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--text);
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field-group input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input[type="text"]:focus { border-color: var(--accent); }

    .textarea-wrap { position: relative; }

    .note-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }

    .note-textarea:focus { border-color: var(--accent); }

    .upload-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    /* File upload area */
    .file-drop {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .file-drop:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(122,196,232,0.05);
    }

    #file-input { display: none; }

    .btn-save {
      padding: 10px 24px;
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: 8px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-save:hover { background: #f0d68a; }

    .char-count {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-left: auto;
    }

    /* View area */
    .view-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .view-area::-webkit-scrollbar { width: 6px; }
    .view-area::-webkit-scrollbar-track { background: transparent; }
    .view-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .note-view {
      max-width: 720px;
    }

    .note-view-title {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .note-view-meta {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .note-view-content {
      font-size: 15px;
      line-height: 1.85;
      color: #d0d0d8;
      white-space: pre-wrap;
      font-family: 'DM Mono', monospace;
    }

    .view-placeholder {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }

    .view-placeholder .ph-icon { font-size: 48px; margin-bottom: 16px; }
    .view-placeholder h3 { font-family: 'Lora', serif; font-size: 20px; margin-bottom: 8px; color: var(--text); opacity: 0.5; }
    .view-placeholder p { font-size: 14px; }

    /* Upload alert in app */
    #app-alert {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      z-index: 9998;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #app-alert.error { background: #2a1515; border: 1px solid rgba(232,122,122,0.4); color: var(--danger); }
    #app-alert.success { background: #122218; border: 1px solid rgba(122,232,164,0.4); color: var(--success); }
    #app-alert.show { display: block; }

    /* Loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0e0e10;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .app-layout { grid-template-columns: 1fr; }
      .sidebar { height: 50vh; }
    }
  </style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="page active">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">📓</span>
      <h1>Notepad</h1>
      <p>Your personal space for thoughts & notes</p>
    </div>

    <div class="tab-toggle">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="auth-alert" class="alert"></div>

    <!-- Login form -->
    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Register form -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Choose a Username</label>
        <input type="text" id="reg-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Create Password</label>
        <input type="password" id="reg-password" placeholder="Min. 4 characters" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="reg-btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page" class="page">
  <header class="app-header">
    <div class="header-brand">📓 Notepad</div>
    <div class="header-right">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="header-username">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Log out</button>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>My Notes</h2>
        <button class="btn-new-note" onclick="clearEditor()">
          <span>＋</span> New Note
        </button>
      </div>
      <div class="notes-list" id="notes-list">
        <div class="empty-state">
          <div class="empty-icon">🗒️</div>
          <p>No notes yet.<br/>Write your first one!</p>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-area">
      <div class="upload-panel">
        <h3>Write or Upload a Note</h3>
        <div class="input-row">
          <div class="field-group">
            <label>Note Title</label>
            <input type="text" id="note-title" placeholder="Give your note a title…"/>
          </div>
          <div class="field-group">
            <label>Content</label>
            <div class="textarea-wrap">
              <textarea class="note-textarea" id="note-content" placeholder="Write your note here…" oninput="updateCharCount()"></textarea>
            </div>
          </div>
          <div class="field-group">
            <label>Or upload a .txt file</label>
            <div class="file-drop" onclick="document.getElementById('file-input').click()">
              📎 Click to upload a .txt file
            </div>
            <input type="file" id="file-input" accept=".txt" onchange="loadFile(event)"/>
          </div>
        </div>
        <div class="upload-actions">
          <button class="btn-save" onclick="saveNote()">Save Note</button>
          <span class="char-count" id="char-count">0 chars</span>
        </div>
      </div>

      <div class="view-area" id="view-area">
        <div class="view-placeholder">
          <div class="ph-icon">✨</div>
          <h3>Select a note to read it</h3>
          <p>Your saved notes will appear here.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="app-alert"></div>

<script>
  // ── State ──
  let session = null; // { username, passwordHash }
  let notes = [];
  let activeNoteId = null;

  // ── Helpers ──
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function showAuthAlert(msg, type='error') {
    const el = document.getElementById('auth-alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function showAppAlert(msg, type='success') {
    const el = document.getElementById('app-alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.getElementById('login-form').style.display = tab==='login' ? '' : 'none';
    document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
    document.getElementById('auth-alert').classList.remove('show');
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Auth ──
  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    if (!username || !password) return showAuthAlert('Please fill in all fields.');
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) return showAuthAlert(data.error);
      const hash = await sha256(password);
      session = { username, passwordHash: hash };
      initApp();
    } catch(e) {
      showAuthAlert('Connection error. Make sure the server is running.');
    } finally {
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();
    if (!username || !password) return showAuthAlert('Please fill in all fields.');
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) return showAuthAlert(data.error);
      showAuthAlert('Account created! You can now sign in.', 'success');
      switchTab('login');
      document.getElementById('login-username').value = username;
    } catch(e) {
      showAuthAlert('Connection error. Make sure the server is running.');
    } finally {
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }

  async function initApp() {
    document.getElementById('header-username').textContent = session.username;
    document.getElementById('user-avatar').textContent = session.username[0].toUpperCase();
    showPage('app-page');
    await fetchNotes();
  }

  function doLogout() {
    session = null;
    notes = [];
    activeNoteId = null;
    document.getElementById('notes-list').innerHTML = '<div class="empty-state"><div class="empty-icon">🗒️</div><p>No notes yet.<br/>Write your first one!</p></div>';
    showPage('auth-page');
  }

  // ── Notes ──
  async function fetchNotes() {
    const res = await fetch(`/api/notes/${session.username}`, {
      headers: { 'X-Auth': session.passwordHash }
    });
    const data = await res.json();
    notes = data.notes || [];
    renderNotesList();
  }

  function renderNotesList() {
    const list = document.getElementById('notes-list');
    if (!notes.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🗒️</div><p>No notes yet.<br/>Write your first one!</p></div>';
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="note-item ${n.id === activeNoteId ? 'active':''}" onclick="viewNote('${n.id}')">
        <button class="note-delete-btn" title="Delete" onclick="event.stopPropagation(); deleteNote('${n.id}')">✕</button>
        <div class="note-item-title">${escHtml(n.title)}</div>
        <div class="note-item-preview">${escHtml(n.content.substring(0,60))}${n.content.length>60?'…':''}</div>
        <div class="note-item-date">${formatDate(n.created_at)}</div>
      </div>
    `).join('');
  }

  function viewNote(id) {
    activeNoteId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;
    document.getElementById('view-area').innerHTML = `
      <div class="note-view">
        <div class="note-view-title">${escHtml(note.title)}</div>
        <div class="note-view-meta">Saved on ${formatDate(note.created_at)} · ${note.content.length} characters</div>
        <div class="note-view-content">${escHtml(note.content)}</div>
      </div>`;
    renderNotesList();
  }

  async function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const content = document.getElementById('note-content').value.trim();
    if (!content) return showAppAlert('Note content cannot be empty.', 'error');
    const res = await fetch(`/api/notes/${session.username}`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'X-Auth': session.passwordHash },
      body: JSON.stringify({ title, content })
    });
    const data = await res.json();
    if (!res.ok) return showAppAlert(data.error, 'error');
    showAppAlert('Note saved!');
    clearEditor();
    await fetchNotes();
    viewNote(data.note.id);
  }

  async function deleteNote(id) {
    const res = await fetch(`/api/notes/${session.username}/${id}`, {
      method: 'DELETE',
      headers: { 'X-Auth': session.passwordHash }
    });
    if (!res.ok) return showAppAlert('Could not delete note.', 'error');
    if (activeNoteId === id) {
      activeNoteId = null;
      document.getElementById('view-area').innerHTML = `
        <div class="view-placeholder">
          <div class="ph-icon">✨</div>
          <h3>Select a note to read it</h3>
          <p>Your saved notes will appear here.</p>
        </div>`;
    }
    showAppAlert('Note deleted.', 'error');
    await fetchNotes();
  }

  function clearEditor() {
    document.getElementById('note-title').value = '';
    document.getElementById('note-content').value = '';
    updateCharCount();
  }

  function loadFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.endsWith('.txt')) return showAppAlert('Only .txt files are supported.', 'error');
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('note-content').value = ev.target.result;
      if (!document.getElementById('note-title').value) {
        document.getElementById('note-title').value = file.name.replace('.txt','');
      }
      updateCharCount();
      showAppAlert(`Loaded "${file.name}"`);
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function updateCharCount() {
    const len = document.getElementById('note-content').value.length;
    document.getElementById('char-count').textContent = `${len.toLocaleString()} char${len!==1?'s':''}`;
  }

  // ── Utils ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + ' · ' +
           d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      const appPage = document.getElementById('app-page');
      if (appPage.classList.contains('active')) saveNote();
    }
    if (e.key === 'Enter') {
      if (document.activeElement === document.getElementById('login-password')) doLogin();
      if (document.activeElement === document.getElementById('reg-password')) doRegister();
    }
  });
</script>
</body>
</html>
